    <!-- 主要內容 -->
    <main class="project-detail">
      <!-- 上方文字區 -->
      <section class="project-header">
        <!-- 左側：標題資訊 -->
        <div class="project-header-main">

          <h1 class="project-title">Honey</h1>

          <div class="project-meta">
            <span>2024</span>
            <span>｜</span>
            <span>舞台動態視覺設計</span>
          </div>
        </div>

        <!-- 右側：作品資訊 -->
        <aside class="project-side-info">
          <div class="side-info-block">
            <h3>類型</h3>
            <p>Motion / Stage Visual</p>
          </div>

          <div class="side-info-block">
            <h3>使用工具</h3>
            <p>After Effects / Blender </p>
          </div>

          <div class="side-info-block">
            <h3>負責內容</h3>
            <p>人物動態、動態節奏設計、畫面合成</p>
          </div>
        </aside>

        <!-- 下一排：敘述 -->
        <div class="project-desc-row">
          <p class="project-description">
            以「甜美與節奏感」為核心，透過高飽和色彩與動態圖形的堆疊，建立具有節拍感的視覺語言。
            在畫面設計上結合幾何構成與流動元素，使畫面隨音樂節奏產生律動，營造出輕盈、活潑且帶有流行感的整體氛圍。
            透過視覺節奏與音樂同步，讓影像不只是背景，而成為強化表演情緒的重要元素
          </p>
        </div>
      </section>

      <!-- 單支影片 -->
      <section class="project-media">
        <div class="video-frame">
          <div class="video-label">Live Video</div>
          <iframe
            src="https://www.youtube.com/embed/l6nyhPTbuOo?autoplay=1&mute=1&controls=0&loop=1&playlist=l6nyhPTbuOo&playsinline=1&modestbranding=1"
            title="Love Motion Visual Design"
            frameborder="0"
            allow="autoplay; fullscreen"
            allowfullscreen
          ></iframe>
