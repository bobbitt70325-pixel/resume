    <!-- 主要內容 -->
    <main class="project-detail">
      <!-- 上方文字區 -->
      <section class="project-header">
        <!-- 左側：標題資訊 -->
        <div class="project-header-main">

          <h1 class="project-title">蝴蝶</h1>

          <div class="project-meta">
            <span>2026</span>
            <span>｜</span>
            <span>空間氛圍投影設計</span>
          </div>
        </div>

        <!-- 右側：作品資訊 -->
        <aside class="project-side-info">
          <div class="side-info-block">
            <h3>類型</h3>
            <p>Projection / Motion Design</p>
          </div>

          <div class="side-info-block">
            <h3>使用工具</h3>
            <p>After Effects / Blender</p>
          </div>

          <div class="side-info-block">
            <h3>負責內容</h3>
            <p>視覺設計、動態規劃、投影內容製作</p>
          </div>
        </aside>

        <!-- 下一排：敘述 -->
        <div class="project-desc-row">
          <p class="project-description">
            以蝴蝶作為空間中的流動意象，
透過光影、雲朵裝置與動態投影，
讓原本靜態的診所場域，
產生如夢境般的輕盈氛圍。

觀者在移動之間，
能感受到視線、光線與空間層次的流動，
讓等待本身也成為一種沉浸式體驗。
            
          </p>
        </div>
      </section>

      <!-- 下方兩支影片 -->
      <section class="project-media horizontal">
        <!-- 左邊：投影內容 -->
        <div class="video-frame">
          <div class="video-label">Projection Content</div>

        src="https://www.youtube-nocookie.com/embed/H82ygAYgD4M?autoplay=1&mute=1&loop=1&playlist=H82ygAYgD4M&start=6&controls=0&rel=0&modestbranding=1&playsinline=1"

        frameborder="0"
        allow="autoplay; fullscreen"

        <!-- 右邊：現場紀錄 -->

  title="Shorts Video"

  allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
  allowfullscreen>
</iframe>
        </div>
      </section>

<section class="scene-gallery">
