<script>
const images =
document.querySelectorAll(".gallery-item img");


images.forEach((img)=>{

const original=img.src;
const hover=img.dataset.hover;

if(!hover) return;


/* 滑鼠移入換圖 */
img.addEventListener(
"mouseenter",
function(){
img.src=hover;
}
);


/* 滑鼠移出換回 */
img.addEventListener(
"mouseleave",
function(){
img.src=original;
}
);


});
</script>
