    <link rel="stylesheet" href="css/graphic.css" /> <!-- 載入這一頁專用 CSS -->
  </head>

  <body>
    <nav class="navbar"> <!-- 導覽列 -->
      <div class="nav-container"> <!-- 導覽列內容寬度容器 -->
        <a href="index.html" class="nav-cat-link"> <!-- 點貓回首頁 -->
          <img src="img/藍貓.gif" alt="走路中的貓" class="nav-cat" /> <!-- 貓咪圖 -->
        </a>

        <ul class="nav-list"> <!-- 導覽選單 -->
          <li><a href="index.html">首頁</a></li> <!-- 回首頁 -->

    <header class="hero"> <!-- 首屏視覺區 -->

        <div class="hero-content"> <!-- 文字容器 -->
          <p class="hero-subtitle">Motion Design</p> <!-- 小標 -->
          <h1>動態視覺建構</h1> <!-- 主標題 -->
          <p class="hero-text">從平面構圖延伸到立體情境、動畫節奏與視覺敘事。</p> <!-- 說明文字 -->
        </div>
      </div>
    </header>

    <main class="works-section"> <!-- 作品主區 -->
      <div class="works-grid"> <!-- 影片卡片排列容器 -->

        <article class="work-card"> <!-- 第一支影片卡片 -->
          <div class="video-wrap"> <!-- 讓 iframe 維持比例 -->
            <iframe
              src="https://www.youtube.com/embed/影片ID1"
              title="作品影片1"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"

            ></iframe> <!-- 嵌入 YouTube 影片 -->
          </div>
          <div class="work-info"> <!-- 影片下方說明區 -->
            <h2>作品名稱 01</h2> <!-- 作品標題 -->
            <p>這支作品可以寫：主題、用途、使用軟體、動畫方向。</p> <!-- 作品描述 -->
          </div>
        </article>

        <article class="work-card"> <!-- 第二支影片卡片 -->
          <div class="video-wrap">
            <iframe
              src="https://www.youtube.com/embed/影片ID2"
              title="作品影片2"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>
          <div class="work-info">
            <h2>作品名稱 02</h2>
            <p>這裡可以寫這支影片的功能，例如：品牌形象動畫、活動主視覺延伸。</p>

        </article>

        <article class="work-card"> <!-- 第三支影片卡片 -->

              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>

            <h2>作品名稱 03</h2>
            <p>這裡可以補充：片長、定位、目標受眾、視覺特色。</p>
