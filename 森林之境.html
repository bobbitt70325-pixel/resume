    <!-- 主要內容 -->
    <main class="project-detail">
      <!-- 上方文字區 -->
      <section class="project-header">
        <!-- 左側：標題資訊 -->
        <div class="project-header-main">

          <h1 class="project-title">森林之境</h1>

          <div class="project-meta">
            <span>2026</span>
            <span>｜</span>
            <span>空間氛圍投影設計</span>
          </div>
        </div>

        <!-- 右側：作品資訊 -->
        <aside class="project-side-info">
          <div class="side-info-block">
            <h3>類型</h3>
            <p>Projection / Motion Design</p>
          </div>

          <div class="side-info-block">
            <h3>使用工具</h3>

          </div>
        </aside>

        <!-- 下一排：敘述 -->
        <div class="project-desc-row">
          <p class="project-description">
            以森林意象為核心，設計一段用於診所空間的動態投影內容，透過光影、植栽感與緩慢流動的節奏，營造柔和、放鬆且具療癒感的沉浸式氛圍。
            本頁同時呈現投影內容本體與現場實際投影紀錄，前者用來展示視覺設計與動態節奏，後者則呈現作品進入真實空間後的光影效果與整體氛圍。
          </p>
        </div>
      </section>

      <!-- 下方兩支影片 -->
      <section class="project-media horizontal">
        <!-- 左邊：投影內容 -->
        <div class="video-frame">
